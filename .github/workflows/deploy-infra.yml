name: Infra Deploy

# 手動のみ
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# インフラへの同時デプロイを避ける
concurrency:
  group: infra-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cdk-deploy-role
          aws-region: ${{ vars.AWS_REGION }}

      - name: cdk diff
        run: npx cdk diff --all || true

      - name: cdk deploy
        run: npx cdk deploy --all --require-approval never
